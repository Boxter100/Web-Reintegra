<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pediatria</title>
    <link rel="stylesheet" href="style.css">
    <!-- Bootstrap icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

</head>
<body>
    <div class="title-cards">
        <div class="container-titulo">
            <h1>Pediátrica</h1>
        </div>
        <div class="container-Subtitulo">
            <h2>Padecimientos Más Comunes</h2>
        </div>
    </div>

    <div class="container-card">
        <div class="card">
            <figure>
                <img src="Imagenes/Desviaciones_del_desarrollo.jpeg" alt="Post Fracturas">
            </figure>
            <div class="contenido-card">
                <h3>Desviaciones Del Desarrollo</h3>
            </div>
        </div>

        <div class="card">
            <figure>
                <img src="Imagenes/alteraciones_de_la_marcha1.jpg" alt="Esguinces">
            </figure>
            <div class="contenido-card">
                <h3>Alteraciones De La Marcha</h3>
            </div>
        </div>

        <div class="card">
            <figure>
                <img src="Imagenes/Defectos_posturales.png" alt="Desgarre Muscular">
            </figure>
            <div class="contenido-card">
                <h3>Defectos Posturales</h3>
            </div>
        </div>

        <div class="whats">
            <i class="bi bi-plus"></i>
            <div class="chat-box">
                <p class="message">Hola, tengo interés en agendar una consulta pediátrica. ¿Podrían informarme sobre los horarios disponibles para revisar la salud de mi hijo/a? Muchas gracias.</p>
                <i class="bi bi-sticky"></i>
            </div>
            <div class="icons">
                <a href="https://wa.me/5573030027?text=Hola,%20tengo%20interés%20en%20agendar%20una%20consulta%20pediátrica.%20¿Podrían%20informarme%20sobre%20los%20horarios%20disponibles%20para%20revisar%20la%20salud%20de%20mi%20hijo/a?%20Muchas%20gracias." target="_blank">
                    <i class="bi bi-send"></i>
                </a>
            </div>
        </div>

    <div class="container">
        <div class="btn_float">
            <a href="../Subindice/subindice.html" class="btn_atras">
                <i class="bi bi-arrow-left-square-fill"></i>
                <span>Atrás</span>
            </a>
        </div>
    </div>

</body>
</html>
