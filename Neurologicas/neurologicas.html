<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neurologicas</title>
    <link rel="stylesheet" href="style.css">
    <!-- Bootstrap icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
    <div class="title-cards">
        <div class="container-titulo">
            <h1>Neurólogicas</h1>
        </div>
        <div class="container-Subtitulo">
            <h2>Padecimientos Más Comunes</h2>
        </div>
    </div>

    <div class="container-card">
        <div class="card">
            <figure>
                <img src="Imagenes/Paralisis_facial.jpeg" alt="Post Fracturas">
            </figure>
            <div class="contenido-card">
                <h3>Parálisis Facial</h3>
            </div>
        </div>

        <div class="card">
            <figure>
                <img src="Imagenes/Embolias.jpeg" alt="Esguinces">
            </figure>
            <div class="contenido-card">
                <h3>Embolias</h3>
            </div>
        </div>

        <div class="card">
            <figure>
                <img src="Imagenes/Sindrome_del_tunel_carpiano.jpeg" alt="Desgarre Muscular">
            </figure>
            <div class="contenido-card">
                <h3>Síndrome Del Túnel Carpiano</h3>
            </div>
        </div>

        <div class="card">
            <figure>
                <img src="Imagenes/Neuropatia.png" alt="Tendinitis">
            </figure>
            <div class="contenido-card">
                <h3>Neuropatía</h3>
            </div>
        </div>

        <div class="card">
            <figure>
                <img src="Imagenes/Neuralgia.jpeg" alt="Desgarre Articular">
            </figure>
            <div class="contenido-card">
                <h3>Neuralgia</h3>
            </div>
        </div>

        <div class="card">
            <figure>
                <img src="Imagenes/Esclerosis.jpg" alt="Pre y Post Operatorio">
            </figure>
            <div class="contenido-card">
                <h3>Neuro - Degenerativas</h3>
            </div>
        </div>
        
    <div class="container">
        <div class="btn_float">
            <a href="../Subindice/subindice.html" class="btn_atras">
                <i class="bi bi-arrow-left-square-fill"></i>
                <span>Atrás</span>
            </a>
        </div>
    </div>

    <div class="whats">
        <i class="bi bi-plus"></i>
        <div class="chat-box">
            <p class="message">Hola, estoy interesado en programar una consulta neurológica. ¿Podrían informarme sobre la disponibilidad de horarios? Agradezco su ayuda.</p>
            <i class="bi bi-sticky"></i>
        </div>
        <div class="icons">
            <a href="https://wa.me/5573030027?text=Hola,%20estoy%20interesado%20en%20programar%20una%20consulta%20neurológica.%20¿Podrían%20informarme%20sobre%20la%20disponibilidad%20de%20horarios?%20Agradezco%20su%20ayuda." target="_blank"></a>
                <i class="bi bi-send"></i>
            </a>
        </div>
    </div>

</body>
</html>
