<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reumatologia</title>
    <link rel="stylesheet" href="style.css">
<!-- Bootstrap icons -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

</head>
<body>
    <div class="title-cards">
        <div class="container-titulo">
            <h1>Reumatológica</h1>
        </div>
        <div class="container-Subtitulo">
            <h2>Padecimientos Más Comunes</h2>
        </div>
    </div>

    <div class="container-card">
        <div class="card">
            <figure>
                <img src="Imagenes/Artritis.jpeg" alt="Post Fracturas">
            </figure>
            <div class="contenido-card">
                <h3>Artritis</h3>
            </div>
        </div>

        <div class="card">
            <figure>
                <img src="Imagenes/Lupus.jpeg" alt="Esguinces">
            </figure>
            <div class="contenido-card">
                <h3>Lupus</h3>
            </div>
        </div>

        <div class="card">
            <figure>
                <img src="Imagenes/Gota.jpg" alt="Desgarre Muscular">
            </figure>
            <div class="contenido-card">
                <h3>Gota</h3>
            </div>
        </div>

        <div class="whats">
            <i class="bi bi-plus"></i>
            <div class="chat-box">
                <p class="message">Hola, estoy interesado en una consulta reumatológica. ¿Podrían informarme sobre los horarios disponibles para hacer una cita? Agradezco su atención.</p>
                <i class="bi bi-sticky"></i>
            </div>
            <div class="icons">
                <a href="https://wa.me/5573030027?text=Hola,%20estoy%20interesado%20en%20una%20consulta%20reumatológica.%20¿Podrían%20informarme%20sobre%20los%20horarios%20disponibles%20para%20hacer%20una%20cita?%20Agradezco%20su%20atención." target="_blank">
                    <i class="bi bi-send"></i>
                </a>
            </div>
        </div>

    <div class="container">
        <div class="btn_float">
            <a href="../Subindice/subindice.html" class="btn_atras">
                <i class="bi bi-arrow-left-square-fill"></i>
                <span>Atrás</span>
            </a>
        </div>
    </div>
</body>
</html>
